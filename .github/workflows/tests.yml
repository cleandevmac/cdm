name: Tests

on:
  push:
    branches: [main]
    paths:
      - cdm
      - rules/**
      - tests/**
      - .github/workflows/tests.yml
  pull_request:
  workflow_dispatch:

jobs:
  test:
    # macOS is not a preference here, it is the only runner that can answer the
    # question. cdm refuses to run on anything but Darwin (cdm:127), parse_json_file
    # shells out to JXA, and — the part that bites — macOS is the only runner whose
    # /bin/bash is 3.2, which is cdm's compatibility floor.
    #
    # Worth knowing why that last one matters: the release job validates with
    # `bash -n` on ubuntu, i.e. bash 5 checking a bash 3.2 target, and that gate
    # cannot see this class of bug. `declare -A m` passes `bash -n` on bash 5 AND
    # exits 0 on bash 3.2, having silently written to the wrong variable. Only
    # executing the code on a real 3.2 catches it. tests/test_portability.sh greps
    # for the known bash-4 idioms; running here is what backstops the rest.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Report the bash under test
        run: |
          /bin/bash -c 'echo "/bin/bash is $BASH_VERSION"'
          test "$(/bin/bash -c 'echo ${BASH_VERSINFO[0]}')" = "3" \
            || echo "::warning::/bin/bash is no longer 3.2 — cdm's floor is now unverified by CI"

      - name: Syntax check
        run: bash -n cdm

      - name: Unit tests
        # Under five locales, deliberately. Two locale-sensitive bugs have shipped
        # in cdm — a collation-resolved bracket range in is_ascii, and a comma
        # decimal separator out of human_kb's awk — and the suite could catch BOTH
        # as written. It simply never ran anywhere they showed: `LANG=de_DE.UTF-8
        # ./tests/test_helpers.sh` failed on unmodified main for the life of the
        # tool. A suite that only ever runs under one developer's locale is one
        # locale's worth of coverage no matter how many assertions it has.
        #
        # The tests that KNOW they are locale-sensitive pin their own locale
        # (in_locale in tests/lib.sh), which is the real defense — it is
        # deterministic and mutation-backed. But that only ever covers the hazards
        # somebody anticipated. This step is the net for the ones nobody did, and
        # at ~4s a pass it is the cheapest coverage in this file.
        #
        # The five are chosen to vary the two axes independently: C is a bare
        # ssh/launchd (byte ctype, C collation), C.UTF-8 pairs a UTF-8 ctype with C
        # collation, en_US.UTF-8 is what a Terminal exports, de_DE.UTF-8 is a comma
        # decimal separator, and an empty environment is `curl … | bash` with
        # nothing set at all — which is very nearly every real run.
        run: |
          set -eu
          for loc in en_US.UTF-8 C.UTF-8 C de_DE.UTF-8; do
            echo "::group::tests under LC_ALL=$loc"
            LC_ALL="$loc" ./tests/run.sh
            echo "::endgroup::"
          done
          echo "::group::tests with no locale variables set at all"
          env -u LC_ALL -u LANG -u LC_CTYPE -u LC_NUMERIC -u LC_COLLATE ./tests/run.sh
          echo "::endgroup::"

      - name: Mutation check — prove the tests can actually fail
        # A green suite proves nothing if its assertions cannot fail. This breaks
        # cdm on purpose and requires the suite to notice each time.
        #
        # Once, not once per locale like the step above: this runs the whole suite
        # per mutation, so a sweep here costs minutes rather than seconds. It does
        # not need one — a mutation whose catchability depends on the ambient
        # locale means some test is trusting the caller's locale instead of pinning
        # its own (that exact failure has happened here: a mutation survived under
        # en_US.UTF-8 and was caught under C.UTF-8), and the sweep above is what
        # surfaces that, at the assertion rather than at the mutant.
        run: ./tests/mutate.sh

      - name: Smoke — the piped path users actually run
        # `./cdm --dry-run` can pass while `curl … | bash` is broken: piped, cdm's
        # $0 is "bash" and BASH_SOURCE is unset, which is what steers rule
        # resolution to the network. Exercise the real entrypoint, not just the file.
        # SIGPIPE on a short-circuiting flag is expected — bash exits without
        # draining the pipe — so only the parse is asserted here.
        run: |
          cat cdm | bash -s -- --help > /dev/null
          echo "piped --help OK"
